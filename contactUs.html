<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="form-group">
        <h3>Contact Us Form</h3>
        <div class="input-group mb-3">
            <span class="input-group-text">Name</span>
            <input class="form-control" placeholder="Enter name">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Email</span>
            <input class="form-control" placeholder="Enter email">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Subject</span>
            <input class="form-control" placeholder="Enter subject">
        </div>
        <div class="input-group mb-3">
            <span class="input-group-text">Message</span>
            <textarea type="text" class="form-control" placeholder="Enter message"></textarea>
        </div>
        <button role="button" class="btn btn-primary" type="button">Send</button>
        <div class="alert alert-primary" role="alert">
            This information will be shared to developer!
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
